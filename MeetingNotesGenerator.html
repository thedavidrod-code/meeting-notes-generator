<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Notes Generator for Obsidian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 16px;
            opacity: 0.95;
        }
        .content {
            padding: 40px;
        }
        .step {
            margin-bottom: 40px;
            display: none;
        }
        .step.active {
            display: block;
        }
        .step-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input[type="text"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            min-height: 200px;
            font-family: 'Monaco', 'Courier New', monospace;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
            margin-bottom: 20px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        button.secondary {
            background: #f0f0f0;
            color: #333;
        }
        button.secondary:hover {
            background: #e0e0e0;
            box-shadow: none;
        }
        .status {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status.success {
            background: #d1fae5;
            border-left: 4px solid #10b981;
            color: #065f46;
        }
        .status.error {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
        }
        .status.info {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
            color: #1e40af;
        }
        .preview {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 20px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            max-height: 500px;
            overflow-y: auto;
            color: #333;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Meeting Notes Generator</h1>
            <p>Convert your meeting transcript into Obsidian-ready markdown</p>
        </div>

        <div class="content">
            <!-- STEP 1: Paste Transcript -->
            <div class="step active" id="step1">
                <div class="step-title">Step 1: Paste Your Meeting Transcript</div>
                
                <div class="form-group">
                    <label>Meeting transcript:</label>
                    <textarea id="transcript" placeholder="Paste the full meeting transcript here. Example: David: Good morning. Sarah: Hi there. David: Let's discuss Q2 strategy..."></textarea>
                </div>

                <div id="status1" class="status"></div>

                <button onclick="goToStep2()">Continue to Details →</button>
                <button class="secondary" onclick="loadSample()">Load Sample Transcript</button>
            </div>

            <!-- STEP 2: Add Details -->
            <div class="step" id="step2">
                <div class="step-title">Step 2: Add Meeting Details</div>
                
                <div class="grid">
                    <div class="form-group">
                        <label>Meeting Title *</label>
                        <input type="text" id="title" placeholder="e.g., Q2 Strategy Session">
                    </div>
                    <div class="form-group">
                        <label>Date *</label>
                        <input type="date" id="date">
                    </div>
                </div>

                <div class="form-group">
                    <label>Attendees * (comma-separated)</label>
                    <input type="text" id="attendees" placeholder="David, Sarah, John">
                </div>

                <div class="form-group">
                    <label>Meeting Purpose (optional)</label>
                    <textarea id="purpose" placeholder="What was this meeting about?" style="min-height: 100px;"></textarea>
                </div>

                <div id="status2" class="status"></div>

                <button onclick="generateNotes()">✨ Generate Obsidian Notes</button>
                <button class="secondary" onclick="goToStep1()">← Back</button>
            </div>

            <!-- STEP 3: Preview & Export -->
            <div class="step" id="step3">
                <div class="step-title">Step 3: Your Obsidian Notes (Preview)</div>
                
                <div class="preview" id="preview"></div>

                <div id="status3" class="status"></div>

                <div class="button-group">
                    <button onclick="copyToClipboard()">📋 Copy to Clipboard</button>
                    <button onclick="downloadMarkdown()">⬇️ Download as .md</button>
                    <button class="secondary" onclick="goToStep2()">← Back</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let generatedNotes = '';

        // Extract key discussion points - universal pattern matching
        function extractKeyPoints(transcript) {
            const keyPoints = [];
            const sentences = transcript.match(/[^.!?]+[.!?]+/g) || [];
            
            // Look for decision-making language
            const decisionPhrases = [
                /(?:we need to|we should|we must|we have to|let's)\s+([^.!?]{15,80})/gi,
                /(?:key|important|critical|priority)\s+(?:is|are)\s+([^.!?]{15,80})/gi,
                /(?:the challenge|the issue|the problem)\s+(?:is|are)\s+([^.!?]{15,80})/gi,
                /(?:agreed|decided|determined)\s+(?:that|on)\s+([^.!?]{15,80})/gi
            ];
            
            decisionPhrases.forEach(pattern => {
                let match;
                while ((match = pattern.exec(transcript)) !== null) {
                    let point = match[1]
                        .replace(/\bum\b|\buh\b|\byou know\b|\bi mean\b|\blike\b/gi, '')
                        .replace(/\s+/g, ' ')
                        .trim();
                    
                    if (point.length > 15 && point.length < 120 && !keyPoints.some(p => p.toLowerCase().substring(0, 30) === point.toLowerCase().substring(0, 30))) {
                        keyPoints.push(point.charAt(0).toUpperCase() + point.slice(1));
                    }
                }
            });
            
            // If we found key points, return them; otherwise extract from sentences with decision markers
            if (keyPoints.length === 0) {
                sentences.forEach(sentence => {
                    if (/(need|should|must|agreed|decided|think|believe|recommend|priority|focus)/i.test(sentence)) {
                        let clean = sentence
                            .replace(/\bum\b|\buh\b|\byou know\b|\bi mean\b|\blike\b/gi, '')
                            .replace(/\s+/g, ' ')
                            .trim();
                        if (clean.length > 20 && clean.length < 120) {
                            keyPoints.push(clean.charAt(0).toUpperCase() + clean.slice(1));
                        }
                    }
                });
            }
            
            return keyPoints.slice(0, 6);
        }

        // Extract action items - universal pattern matching
        function extractActionItems(transcript) {
            const actionItems = [];
            
            // Look for commitment/assignment language
            const actionPatterns = [
                /(?:I'll|I will|we'll|we will|you should|you need to|someone needs to)\s+([^.!?]{15,100})/gi,
                /(?:can you|could you|would you)\s+([^.!?]{15,100})/gi,
                /(?:by|due|deadline)\s+([^.!?]{5,30}).*?(?:we need to|I need to|you need to)\s+([^.!?]{15,100})/gi,
                /(?:action item|task|todo|to do)\s*:?\s+([^.!?]{15,100})/gi
            ];
            
            actionPatterns.forEach(pattern => {
                let match;
                while ((match = pattern.exec(transcript)) !== null) {
                    let task = match[match.length - 1] // Get the last capture group
                        .replace(/\bum\b|\buh\b|\byou know\b|\bi mean\b|\blike\b/gi, '')
                        .replace(/\s+/g, ' ')
                        .trim();
                    
                    if (task.length > 15 && task.length < 120 && !actionItems.some(a => a.toLowerCase().substring(0, 30) === task.toLowerCase().substring(0, 30))) {
                        actionItems.push(task.charAt(0).toUpperCase() + task.slice(1));
                    }
                }
            });
            
            return actionItems.slice(0, 8);
        }

        // Set today's date
        document.getElementById('date').valueAsDate = new Date();

        function showStatus(stepId, message, type = 'info') {
            const status = document.getElementById(stepId);
            status.textContent = message;
            status.className = 'status show ' + type;
            setTimeout(() => {
                status.classList.remove('show');
            }, 4000);
        }

        function goToStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            currentStep = step;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goToStep1() { goToStep(1); }
        function goToStep2() {
            goToStep(2);
        }

        function loadSample() {
            const sample = `David: Good morning everyone. Thanks for joining. Let's dive into our Q2 strategy. We have three main focus areas.\n\nSarah: What are those three areas?\n\nDavid: First, strengthen our relationships with Google and AT&T. These are our anchor accounts. Second, develop new offerings for streaming platforms like Spotify and HBO. That's where the growth opportunity is. Third, expand our SCV Digital services locally.\n\nJohn: On the Google account, what are the main pain points?\n\nDavid: They want faster turnaround on campaigns. Our current process is too slow. They also want better reporting. Sarah, I think you should take the lead on a complete workflow audit for Google.\n\nSarah: I can do that. I'll schedule working sessions with their team. When do they need recommendations?\n\nDavid: End of month would be good. March 31st. That gives you about a week and a half.\n\nJohn: What about Spotify?\n\nDavid: I want three distinct package options for Spotify. Starter, Growth, and Enterprise. John, can you take the lead on this with the creative team?\n\nJohn: Absolutely. I'll coordinate with creative and loop in Emma from strategy.\n\nDavid: Perfect. Now, here's what's important: everyone needs to document everything in the CRM. Every call note, every decision. This is how we track progress. Sarah, can you send out a summary and make sure it's in the CRM?\n\nSarah: Will do. I'll document everything by end of day.\n\nDavid: Great. Let's do a weekly sync. Monday at 10 AM starting next week. That's non-negotiable. So to recap: Google audit by March 31st, Spotify proposal with John, weekly syncs Monday 10 AM, and CRM documentation. Any other questions?\n\nJohn: I think we're good.\n\nSarah: I'll get started this week.\n\nDavid: Perfect. Thanks everyone.`;
            document.getElementById('transcript').value = sample;
            showStatus('status1', '✅ Sample transcript loaded', 'success');
        }

        function generateNotes() {
            const title = document.getElementById('title').value.trim();
            const date = document.getElementById('date').value;
            const attendees = document.getElementById('attendees').value.trim();
            const purpose = document.getElementById('purpose').value.trim();
            const transcript = document.getElementById('transcript').value.trim();

            if (!title || !attendees) {
                showStatus('status2', '⚠️ Please fill in Title and Attendees', 'error');
                return;
            }

            // Extract key points and action items
            const keyPoints = extractKeyPoints(transcript);
            const actionItems = extractActionItems(transcript);

            generatedNotes = `## 📋 Meeting Info\n- **Date**: ${date}\n- **Attendees**: ${attendees}\n- **Purpose**: ${purpose || 'Meeting discussion'}\n\n---\n\n## 🎯 Key Discussion Points\n\n${keyPoints.length > 0 ? keyPoints.map(p => `- ${p}`).join('\n') : `- Review transcript for key discussion points\n- Note any strategic priorities mentioned\n- Identify client needs and concerns\n- Document decisions and commitments`}\n\n---\n\n## ✅ Action Items\n\n${actionItems.length > 0 ? actionItems.map(item => `- [ ] ${item}`).join('\n') : `- [ ] Review meeting for specific tasks\n- [ ] Identify task owners for each action\n- [ ] Set clear deadlines\n- [ ] Document in CRM`}\n\n---\n\n## 📌 Next Steps\n\n1. Review action items and assign clear owners\n2. Set specific deadlines for each task\n3. Schedule follow-up if needed\n4. Update project management system\n5. Share notes with relevant team members\n\n---\n\n## 📝 Full Meeting Transcript\n\n\\`\\`\\`\n${transcript}\n\\`\\`\\`\n\n---\n\n*Generated: ${new Date().toLocaleString()}*\n*For Obsidian • [[Meetings]] • [[Action Items]]*`;

            document.getElementById('preview').textContent = generatedNotes;
            goToStep(3);
            showStatus('status3', '✅ Notes generated successfully!', 'success');
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(generatedNotes).then(() => {
                showStatus('status3', '✅ Copied to clipboard! Ready to paste in Obsidian.', 'success');
            }).catch(() => {
                showStatus('status3', '❌ Copy failed. Try downloading instead.', 'error');
            });
        }

        function downloadMarkdown() {
            const title = document.getElementById('title').value.replace(/[^a-z0-9]/gi, '-').toLowerCase();
            const filename = `${title || 'meeting-notes'}.md`;
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(generatedNotes));
            element.setAttribute('download', filename);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
            showStatus('status3', `✅ Downloaded as ${filename}`, 'success');
        }
    </script>
</body>
</html>
