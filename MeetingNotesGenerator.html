<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Notes Generator for Obsidian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 16px;
            opacity: 0.95;
        }
        .content {
            padding: 40px;
        }
        .step {
            margin-bottom: 40px;
            display: none;
        }
        .step.active {
            display: block;
        }
        .step-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input[type="text"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            min-height: 200px;
            font-family: 'Monaco', 'Courier New', monospace;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
            margin-bottom: 20px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        button.secondary {
            background: #f0f0f0;
            color: #333;
        }
        button.secondary:hover {
            background: #e0e0e0;
            box-shadow: none;
        }
        .status {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status.success {
            background: #d1fae5;
            border-left: 4px solid #10b981;
            color: #065f46;
        }
        .status.error {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
        }
        .preview {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 20px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            max-height: 600px;
            overflow-y: auto;
            color: #333;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Meeting Notes Generator</h1>
            <p>Create Obsidian-ready markdown notes</p>
        </div>

        <div class="content">
            <!-- STEP 1: Paste Transcript -->
            <div class="step active" id="step1">
                <div class="step-title">Step 1: Meeting Details</div>
                
                <div class="grid">
                    <div class="form-group">
                        <label>Meeting Title *</label>
                        <input type="text" id="title" placeholder="e.g., Q2 Strategy Session">
                    </div>
                    <div class="form-group">
                        <label>Date *</label>
                        <input type="date" id="date">
                    </div>
                </div>

                <div class="form-group">
                    <label>Attendees * (comma-separated)</label>
                    <input type="text" id="attendees" placeholder="David, Sarah, John">
                </div>

                <div class="form-group">
                    <label>Meeting Purpose (optional)</label>
                    <textarea id="purpose" placeholder="What was this meeting about?" style="min-height: 80px;"></textarea>
                </div>

                <div id="status1" class="status"></div>
                <button onclick="goToStep2()">Continue →</button>
            </div>

            <!-- STEP 2: Add Notes -->
            <div class="step" id="step2">
                <div class="step-title">Step 2: Your Notes</div>
                
                <div class="form-group">
                    <label>Key Discussion Points (one per line)</label>
                    <textarea id="keyPoints" placeholder="- Important decision made&#10;- Customer feedback received&#10;- Next steps discussed" style="min-height: 120px;"></textarea>
                </div>

                <div class="form-group">
                    <label>Action Items (one per line)</label>
                    <textarea id="actionItems" placeholder="- [ ] Task 1 - Owner - Due Date&#10;- [ ] Task 2 - Owner - Due Date" style="min-height: 120px;"></textarea>
                </div>

                <div class="form-group">
                    <label>Full Transcript (optional)</label>
                    <textarea id="transcript" placeholder="Paste the full meeting transcript here (optional)" style="min-height: 120px;"></textarea>
                </div>

                <div id="status2" class="status"></div>
                <button onclick="generateNotes()">✨ Generate Markdown</button>
                <button class="secondary" onclick="goToStep1()">← Back</button>
            </div>

            <!-- STEP 3: Preview & Export -->
            <div class="step" id="step3">
                <div class="step-title">Step 3: Your Obsidian Notes</div>
                
                <div class="preview" id="preview"></div>

                <div id="status3" class="status"></div>

                <div class="button-group">
                    <button onclick="copyToClipboard()">📋 Copy to Clipboard</button>
                    <button onclick="downloadMarkdown()">⬇️ Download as .md</button>
                    <button class="secondary" onclick="goToStep2()">← Back</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let generatedNotes = '';

        // Set today's date when the page loads
        window.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
        });

        function showStatus(stepId, message, type = 'info') {
            const status = document.getElementById(stepId);
            status.textContent = message;
            status.className = 'status show ' + type;
            setTimeout(() => {
                status.classList.remove('show');
            }, 4000);
        }

        function goToStep(step) {
            try {
                document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
                const stepElement = document.getElementById('step' + step);
                if (!stepElement) {
                    throw new Error('Step ' + step + ' not found');
                }
                stepElement.classList.add('active');
                currentStep = step;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch(e) {
                console.error('Error:', e);
                alert('Error: ' + e.message);
            }
        }

        function goToStep1() { 
            goToStep(1); 
        }
        
        function goToStep2() {
            const title = document.getElementById('title').value.trim();
            const attendees = document.getElementById('attendees').value.trim();
            
            if (!title || !attendees) {
                showStatus('status1', '⚠️ Please fill in Title and Attendees', 'error');
                return;
            }
            goToStep(2);
        }

        function generateNotes() {
            const title = document.getElementById('title').value.trim();
            const date = document.getElementById('date').value;
            const attendees = document.getElementById('attendees').value.trim();
            const purpose = document.getElementById('purpose').value.trim();
            const keyPoints = document.getElementById('keyPoints').value.trim();
            const actionItems = document.getElementById('actionItems').value.trim();
            const transcript = document.getElementById('transcript').value.trim();

            if (!title || !attendees) {
                showStatus('status2', '⚠️ Please fill in Title and Attendees', 'error');
                return;
            }

            // Format key points
            let keyPointsFormatted = keyPoints 
                ? keyPoints.split('\n').filter(p => p.trim()).map(p => p.trim().startsWith('-') ? p.trim() : '- ' + p.trim()).join('\n')
                : '- Add key discussion points here';

            // Format action items
            let actionItemsFormatted = actionItems 
                ? actionItems.split('\n').filter(a => a.trim()).map(a => a.trim().startsWith('-') ? a.trim() : '- ' + a.trim()).join('\n')
                : '- [ ] Add action items here';

            // Generate markdown
            generatedNotes = `## 📋 Meeting Info
- **Date**: ${date}
- **Attendees**: ${attendees}
- **Purpose**: ${purpose || 'Meeting discussion'}

---

## 🎯 Key Discussion Points

${keyPointsFormatted}

---

## ✅ Action Items

${actionItemsFormatted}

---

## 📌 Next Steps

1. Review action items and assign owners
2. Set deadlines for each task
3. Schedule follow-up if needed
4. Share notes with team

${transcript ? `---

## 📝 Full Transcript

\`\`\`
${transcript}
\`\`\`` : ''}

---

*Generated: ${new Date().toLocaleString()}*
*For Obsidian • [[Meetings]] • [[Action Items]]*`;

            document.getElementById('preview').textContent = generatedNotes;
            goToStep(3);
            showStatus('status3', '✅ Markdown generated!', 'success');
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(generatedNotes).then(() => {
                showStatus('status3', '✅ Copied to clipboard!', 'success');
            }).catch(() => {
                showStatus('status3', '❌ Copy failed. Try downloading instead.', 'error');
            });
        }

        function downloadMarkdown() {
            const title = document.getElementById('title').value.replace(/[^a-z0-9]/gi, '-').toLowerCase();
            const filename = `${title || 'meeting-notes'}.md`;
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(generatedNotes));
            element.setAttribute('download', filename);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
            showStatus('status3', `✅ Downloaded as ${filename}`, 'success');
        }
    </script>
</body>
</html>
